# sphere -> V + Native C++ Bidirectional Chamfer
# Key change: Chamfer is computed IN C++ and included in line search evaluation.
# This fixes the core problem: line search no longer rejects Chamfer-directed steps.

input_mesh_path: "assets/isosphere.obj"
target_mesh_path: "assets/V.obj"
output_dir: "output/sphere_to_V_native_chamfer/"

simulation:
  grid_dx: 1
  points_per_cell_cuberoot: 4
  grid_min_point: [-16.0, -16.0, -16.0]
  grid_max_point: [16.0, 16.0, 16.0]
  lam: 38888.89
  mu: 58333.3
  density: 75.0
  dt: 0.00833333333
  drag: 0.5
  external_force: [0.0, 0.0, 0.0]
  smoothing_factor: 0.955

optimization:
  num_animations: 40
  num_timesteps: 10
  control_stride: 1
  num_passes: 3
  max_gd_iters: 1
  max_ls_iters: 5
  initial_alpha: 0.01
  adaptive_alpha_enabled: true
  adaptive_alpha_target_norm: 2500.0
  adaptive_alpha_min_scale: 0.1
  gd_tol: 0.0
  use_session_mode: true
  use_pcgrad: false
  w_render_base: 0.0
  j_barrier_weight: 0.0
  j_barrier_target: 0.8
  render_adam_enabled: false

  # Native C++ Bidirectional Chamfer
  w_chamfer: 10.0           # Chamfer weight (adaptive: 10 = 10x physics magnitude)
  chamfer_start_ep: 5       # Chamfer ON from ep5 (35 active episodes)
  chamfer_ramp_ep: 10       # Linear ramp over episodes 5-15

  # Phase 2: Chamfer-dominant after physics converges
  physics_weight_start_ep: 15   # Earlier physics ramp down
  physics_weight_ramp_ep: 5     # Ramp down over 5 episodes (ep15-20)
  physics_weight_final: 0.1     # 10% physics weight for stability
  smoothing_start_ep: 15        # Reduce smoothing for better gradient flow
  smoothing_value: 0.7          # 0.7 vs default 0.88-0.92

  # Disable old callback-based chamfer
  chamfer_in_callback: false

  loss:
    enabled: true
    w_alpha: 0.0
    w_depth: 0.0
    w_photo: 0.0
    w_edge: 0.0
    w_cov_align: 0.0
    w_cov_reg: 0.0
    w_det_barrier: 0.0
    schedule: 'constant'

upsample:
  use_simple_pipeline: true
  render_loss_weight: 1.0
  debug:
    verbose: false
  covariance:
    use_curvature_for_target: true
    sigma_isotropic: 0.038
    sigma0: 0.25
    k_F: 32
    use_multiscale_F: true
    k_F_coarse: 64
    k_F_fine: 16
    multiscale_blend_mode: 'adaptive'
    enable_subdivision: true
    subdivision_target: 100000
    subdivision_jitter: 0.15
    sv_min: 0.60
    sv_max: 1.30

camera:
  width: 640
  height: 360
  fx: 237.5
  fy: 237.5
  cx: 320.0
  cy: 180.0
  znear: 0.01
  zfar: 100.0
  lookat:
    eye: [20.0, -25.0, 12.5]
    target: [0.0, 0.0, 0.0]
    up: [0.0, 0.0, 1.0]

cameras:
  - eye: [-25.0, 20.0, 12.5]
    target: [0.0, 0.0, 0.0]
    up: [0.0, 0.0, 1.0]

render:
  num_frames: 1
  schedule: uniform
  bg: [1.0, 1.0, 1.0]
  training_resolution_scale: 0.5
  particle_color: [0.27, 0.51, 0.71]
  surface_mask_ratio: 0.20
  surface_mask_mode: 'last'
